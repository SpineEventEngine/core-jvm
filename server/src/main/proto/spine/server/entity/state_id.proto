syntax = "proto3";

package spine.server.entity;

import "spine/options.proto";

option (type_url_prefix) = "type.spine.io";
option (SPI_all) = true;
option java_package = "io.spine.server.entity";
option java_outer_classname = "StateIdProto";
option java_multiple_files = true;

import "google/protobuf/any.proto";

// Identifies a stored state of an entity: the entity and the version
// at which the state became current.
//
// Serves as the record key of the entity state history, so writing the state
// of the same entity at the same version again overwrites one record instead
// of creating a duplicate.
//
message EntityStateId {

    // The packed identifier of the entity.
    google.protobuf.Any entity_id = 1;

    // The number of the entity version this state belongs to.
    int32 version = 2;
}
